<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MS SMD Lens</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --surface3: #222736;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5a0;
    --accent2: #0090ff;
    --warn: #ff9f0a;
    --danger: #ff453a;
    --text: #f0f2f8;
    --text2: #8892a4;
    --text3: #4a5568;
    --radius: 18px;
    --radius-sm: 10px;
  }

  body.theme-light {
    --bg: #eef3f7;
    --surface: #f9fbfd;
    --surface2: #ffffff;
    --surface3: #edf2f7;
    --border: rgba(14, 24, 36, 0.09);
    --accent: #0aa36b;
    --accent2: #0a84ff;
    --warn: #c27a00;
    --danger: #d64234;
    --text: #111827;
    --text2: #5f6b7a;
    --text3: #8a95a5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px 0;
    position: relative;
    overflow-x: clip;
    touch-action: pan-y;
  }

  /* Ambient glow background */
  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,229,160,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body.theme-light::before {
    background: radial-gradient(ellipse, rgba(10,163,107,0.08) 0%, transparent 72%);
  }

  .phone-shell {
    width: min(393px, 100%);
    min-height: 852px;
    background: var(--surface);
    border-radius: 48px;
    margin: 40px auto 0;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 40px 100px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
    z-index: 1;
    overscroll-behavior-x: none;
  }

  .app-content {
    padding: 14px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding-top: 2px;
    padding-bottom: 2px;
  }

  .header-left { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .app-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
    text-align: center;
  }

  .header-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, rgba(0,229,160,0.08), rgba(0,144,255,0.06));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(0,229,160,0.2);
    overflow: hidden;
  }

  .header-logo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .top-controls {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
  }

  .theme-cycle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: color-mix(in srgb, var(--surface2) 88%, transparent);
    color: var(--text);
    cursor: pointer;
    width: 36px;
    height: 36px;
    padding: 0;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.4px;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.14);
  }

  .theme-cycle-btn:hover {
    transform: translateY(-1px);
    background: color-mix(in srgb, var(--surface3) 88%, transparent);
  }

  .theme-cycle-btn:active {
    transform: translateY(0);
  }

  .theme-cycle-text {
    color: var(--accent);
    line-height: 1;
  }

  /* Input Card */
  .input-card {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 18px;
    border: 1px solid var(--border);
    position: relative;
  }

  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .format-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(0,229,160,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,0.2);
    transition: all 0.3s ease;
    opacity: 0;
    transform: scale(0.8);
  }
  .format-badge.visible {
    opacity: 1;
    transform: scale(1);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .code-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    caret-color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .code-input::placeholder {
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0;
    font-size: 24px;
  }

  .clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 4px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, background 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .clear-btn.visible {
    opacity: 1;
    pointer-events: all;
  }
  .clear-btn:hover { color: var(--text); background: var(--surface3); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0 12px;
  }

  .format-hints {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }

  .hint-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .hint-item:hover { background: var(--surface3); }

  .hint-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .hint-label {
    font-size: 10px;
    color: var(--text3);
    font-weight: 500;
  }

  /* Result Card */
  .result-card {
    background: var(--surface2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: top center;
  }

  .result-card.hidden {
    opacity: 0;
    transform: scale(0.95) translateY(-8px);
    pointer-events: none;
    height: 0;
    padding: 0;
    border: none;
    margin: 0;
  }

  .result-accent-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .result-body { padding: 18px; }

  .result-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    text-align: center;
    margin-bottom: 8px;
  }

  .result-primary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 52px;
    font-weight: 800;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), #00c9ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 4px;
    transition: all 0.3s ease;
  }

  .units-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 14px 0;
  }

  .unit-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px;
    gap: 3px;
  }
  .unit-cell + .unit-cell {
    border-left: 1px solid var(--border);
  }
  .unit-name {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
  }
  .unit-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .unit-value.dim { color: var(--text3); }

  .result-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .meta-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--surface3);
  }
  .meta-chip-icon { font-size: 14px; }
  .meta-chip-info { display: flex; flex-direction: column; gap: 0px; }
  .meta-chip-label { font-size: 9px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .meta-chip-value { font-size: 13px; font-weight: 700; }
  .meta-chip-value.orange { color: var(--warn); }
  .meta-chip-value.purple { color: var(--accent2); }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    background: rgba(0,229,160,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,0.2);
    transition: all 0.2s ease;
  }
  .copy-btn:hover { background: rgba(0,229,160,0.2); transform: scale(1.03); }
  .copy-btn.copied { background: rgba(0,229,160,0.2); color: #fff; }

  /* Error Banner */
  .error-banner {
    background: rgba(255,159,10,0.08);
    border: 1px solid rgba(255,159,10,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    transition: all 0.3s ease;
  }
  .error-banner.hidden { display: none; }
  .error-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* History */
  .history-section { display: flex; flex-direction: column; gap: 10px; }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .clear-history-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,69,58,0.7);
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .clear-history-btn:hover { color: var(--danger); }

  .history-list {
    background: var(--surface2);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .history-row {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .history-row:last-child { border-bottom: none; }
  .history-row:hover { background: var(--surface3); }
  .history-row:active { transform: scale(0.99); }

  .history-code-badge {
    width: 40px;
    height: 40px;
    background: rgba(0,229,160,0.08);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    border: 1px solid rgba(0,229,160,0.12);
  }

  .history-info { flex: 1; min-width: 0; }
  .history-result { font-size: 15px; font-weight: 600; color: var(--text); }
  .history-time { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .history-arrow { color: var(--text3); font-size: 12px; opacity: 0.4; }

  /* Empty history */
  .history-empty {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--text3);
  }

  /* Result pulse animation */
  @keyframes resultPop {
    0% { transform: scale(0.97); }
    50% { transform: scale(1.01); }
    100% { transform: scale(1); }
  }
  .result-pop { animation: resultPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Scrollable inner */
  .scroll-inner {
    max-height: none;
    overflow: visible;
    scrollbar-width: none;
  }
  .scroll-inner::-webkit-scrollbar { display: none; }

  @media (max-width: 430px) {
    body {
      padding-bottom: 0;
    }

    .phone-shell {
      width: 100%;
      min-height: 100dvh;
      margin-top: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .app-content {
      padding-top: max(10px, env(safe-area-inset-top));
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .header {
      padding-top: 0;
    }
  }
</style>
</head>

          </div>
          <div class="hint-item" onclick="setInput('1001')">
            <span class="hint-code">1001</span>
            <span class="hint-label">4-Digit</span>
          </div>
          <div class="hint-item" onclick="setInput('01C')">
            <span class="hint-code">01C</span>
            <span class="hint-label">EIA-96</span>
          </div>
        </div>
      </div>

      <!-- Result Card -->
      <div class="result-card hidden" id="resultCard">
        <div class="result-accent-bar"></div>
        <div class="result-body">
          <div class="result-label">Resistance</div>
          <div class="result-primary" id="resultPrimary">4.7 kΩ</div>

          <div class="units-row">
            <div class="unit-cell">
              <span class="unit-name">Ohms</span>
              <span class="unit-value" id="unitOhms">4700 Ω</span>
            </div>
            <div class="unit-cell">
              <span class="unit-name">Kilohms</span>
              <span class="unit-value" id="unitKilo">—</span>
            </div>
            <div class="unit-cell">
              <span class="unit-name">Megohms</span>
              <span class="unit-value" id="unitMega">—</span>
            </div>
          </div>

          <div class="result-meta">
            <div class="meta-chip">
              <span class="meta-chip-icon">±</span>
              <div class="meta-chip-info">
                <span class="meta-chip-label">Tolerance</span>
                <span class="meta-chip-value orange" id="metaTolerance">±5%</span>
              </div>
            </div>
            <div class="meta-chip">
              <span class="meta-chip-icon" style="font-size:12px">⬡</span>
              <div class="meta-chip-info">
                <span class="meta-chip-label">Format</span>
                <span class="meta-chip-value purple" id="metaFormat">3-Digit</span>
              </div>
            </div>
            <button class="copy-btn" id="copyBtn" onclick="copyResult()">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
                <path d="M4 1a1 1 0 011-1h5a1 1 0 011 1v1h1a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1h0V1zm1 0v2H4v9h8V3h-1V1H5z"/>
              </svg>
              Copy
            </button>
          </div>
        </div>
      </div>

      <!-- Error Banner -->
      <div class="error-banner hidden" id="errorBanner">
        <span class="error-icon">⚠️</span>
        <span id="errorText">Invalid code format.</span>
      </div>

      <!-- History -->
      <div class="history-section" id="historySection" style="display:none">
        <div class="history-header">
          <span class="history-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Recent
          </span>
          <button class="clear-history-btn" onclick="clearHistory()">Clear</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ─── EIA-96 LOOKUP TABLE ───────────────────────────────────────────────────
const EIA96_BASE = {
  '01':100,'02':102,'03':105,'04':107,'05':110,
  '06':113,'07':115,'08':118,'09':121,'10':124,
  '11':127,'12':130,'13':133,'14':137,'15':140,
  '16':143,'17':147,'18':150,'19':154,'20':158,
  '21':162,'22':165,'23':169,'24':174,'25':178,
  '26':182,'27':187,'28':191,'29':196,'30':200,
  '31':205,'32':210,'33':215,'34':221,'35':226,
  '36':232,'37':237,'38':243,'39':249,'40':255,
  '41':261,'42':267,'43':274,'44':280,'45':287,
  '46':294,'47':301,'48':309,'49':316,'50':324,
  '51':332,'52':340,'53':348,'54':357,'55':365,
  '56':374,'57':383,'58':392,'59':402,'60':412,
  '61':422,'62':432,'63':442,'64':453,'65':464,
  '66':475,'67':487,'68':499,'69':511,'70':523,
  '71':536,'72':549,'73':562,'74':576,'75':590,
  '76':604,'77':619,'78':634,'79':649,'80':665,
  '81':681,'82':698,'83':715,'84':732,'85':750,
  '86':768,'87':787,'88':806,'89':825,'90':845,
  '91':866,'92':887,'93':909,'94':931,'95':953,'96':976
};

const EIA96_MULT = {
  'Z':0.001,'Y':0.01,'R':0.01,'X':0.1,'S':0.1,
  'A':1,'B':10,'C':100,'D':1000,'E':10000,'F':100000
};

// ─── DECODER LOGIC ─────────────────────────────────────────────────────────
function detectType(code) {
  if (!code) return 'invalid';
  const c = code.toUpperCase();
  if (c.length === 3) {
    const digits = c.slice(0,2);
    const letter = c[2];
    if (/^\d{2}$/.test(digits) && EIA96_MULT[letter] !== undefined) return 'eia96';
    if (/^\d{3}$/.test(c)) return '3digit';
  }
  if (c.length === 4 && /^\d{4}$/.test(c)) return '4digit';
  return 'invalid';
}

function decode(input) {
  const code = input.toUpperCase().trim();
  const type = detectType(code);
  if (type === 'invalid') return null;

  let ohms;
  let tolerance;
  let label;

  if (type === '3digit') {
    const a = parseInt(code[0]);
    const b = parseInt(code[1]);
    const m = parseInt(code[2]);
    ohms = (a * 10 + b) * Math.pow(10, m);
    tolerance = '±5%'; label = '3-Digit';
  } else if (type === '4digit') {
    const a = parseInt(code[0]);
    const b = parseInt(code[1]);
    const c = parseInt(code[2]);
    const m = parseInt(code[3]);
    ohms = (a * 100 + b * 10 + c) * Math.pow(10, m);
    tolerance = '±1%'; label = '4-Digit';
  } else if (type === 'eia96') {
    const digits = code.slice(0,2);
    const letter = code[2];
    const base = EIA96_BASE[digits];
    const mult = EIA96_MULT[letter];
    if (!base || mult === undefined) return null;
    ohms = base * mult;
    tolerance = '±1%'; label = 'EIA-96';
  }

  return { ohms, tolerance, label };
}

// ─── FORMATTERS ────────────────────────────────────────────────────────────
function fmtNum(v) {
  if (v === Math.floor(v)) return v.toLocaleString();
  return parseFloat(v.toPrecision(4)).toString();
}

function formatOhms(ohms) { return fmtNum(ohms) + ' Ω'; }

function formatKilo(ohms) {
  if (ohms < 1000) return null;
  return fmtNum(ohms / 1000) + ' kΩ';
}

function formatMega(ohms) {
  if (ohms < 1e6) return null;
  return fmtNum(ohms / 1e6) + ' MΩ';
}

function primaryDisplay(ohms) {
  const m = formatMega(ohms);
  if (m) return m;
  const k = formatKilo(ohms);
  if (k) return k;
  return formatOhms(ohms);
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem('ms_smd_history') || '[]');
let lastResult = null;
let themePreference = localStorage.getItem('ms_smd_theme') || 'system';
const systemThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
const themeCycleBtn = document.getElementById('themeCycleBtn');
const themeCycleText = document.getElementById('themeCycleText');
const THEME_ORDER = ['system', 'dark', 'light'];

// ─── THEME ─────────────────────────────────────────────────────────────────
function applyTheme(choice) {
  themePreference = choice;
  const resolvedTheme = choice === 'system'
    ? (systemThemeQuery.matches ? 'dark' : 'light')
    : choice;

  document.body.classList.toggle('theme-light', resolvedTheme === 'light');
  document.body.classList.toggle('theme-dark', resolvedTheme === 'dark');
  themeCycleText.textContent = choice === 'dark' ? 'D' : choice === 'light' ? 'L' : 'S';
  themeCycleBtn.setAttribute('aria-label', `Theme mode: ${choice}. Tap to change.`);
  themeCycleBtn.title = `Theme: ${choice}`;
}

function setTheme(choice) {
  localStorage.setItem('ms_smd_theme', choice);
  applyTheme(choice);
}

function cycleTheme() {
  const currentIndex = THEME_ORDER.indexOf(themePreference);
  const nextTheme = THEME_ORDER[(currentIndex + 1) % THEME_ORDER.length];
  setTheme(nextTheme);
}

// ─── UI UPDATE ─────────────────────────────────────────────────────────────
themeCycleBtn.addEventListener('click', cycleTheme);

if (typeof systemThemeQuery.addEventListener === 'function') {
  systemThemeQuery.addEventListener('change', () => {
    if (themePreference === 'system') applyTheme('system');
  });
} else if (typeof systemThemeQuery.addListener === 'function') {
  systemThemeQuery.addListener(() => {
    if (themePreference === 'system') applyTheme('system');
  });
}

applyTheme(themePreference);

document.getElementById('codeInput').addEventListener('input', onInput);

function onInput(e) {
  const raw = e.target.value.toUpperCase().replace(/[^0-9A-Z]/g, '');
  e.target.value = raw;

  const clearBtn = document.getElementById('clearBtn');
  clearBtn.classList.toggle('visible', raw.length > 0);

  if (!raw) {
    hideResult();
    hideError();
    document.getElementById('formatBadge').classList.remove('visible');
    return;
  }

  const result = decode(raw);
  if (result) {
    showResult(raw, result);
    hideError();
  } else {
    hideResult();
    if (raw.length >= 2) showError(raw);
    else hideError();
    document.getElementById('formatBadge').classList.remove('visible');
  }
}

function showResult(code, result) {
  const { ohms, tolerance, label } = result;
  lastResult = { code, ohms, tolerance, label };

  // Badge
  const badge = document.getElementById('formatBadge');
  badge.textContent = label;
  badge.classList.add('visible');

  // Primary
  document.getElementById('resultPrimary').textContent = primaryDisplay(ohms);

  // Units
  document.getElementById('unitOhms').textContent = formatOhms(ohms);
  const kilo = formatKilo(ohms);
  const mega = formatMega(ohms);
  const kiloEl = document.getElementById('unitKilo');
  const megaEl = document.getElementById('unitMega');
  kiloEl.textContent = kilo || '—';
  kiloEl.className = 'unit-value' + (kilo ? '' : ' dim');
  megaEl.textContent = mega || '—';
  megaEl.className = 'unit-value' + (mega ? '' : ' dim');

  // Meta
  document.getElementById('metaTolerance').textContent = tolerance;
  document.getElementById('metaFormat').textContent = label;

  // Show card
  const card = document.getElementById('resultCard');
  card.classList.remove('hidden');
  card.classList.add('result-pop');
  setTimeout(() => card.classList.remove('result-pop'), 400);

  // Save to history
  saveHistory(code, primaryDisplay(ohms));
}

function hideResult() {
  document.getElementById('resultCard').classList.add('hidden');
  lastResult = null;
}

function showError(code) {
  const msg = code.length === 3
    ? 'Invalid code. Try: 3 digits (e.g. 472) or 2 digits + letter (e.g. 01C)'
    : code.length === 4
    ? 'Invalid 4-digit code. All characters must be numeric (e.g. 1001)'
    : 'Unrecognized format. Enter 3-digit, 4-digit, or EIA-96 code.';
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorBanner').classList.remove('hidden');
}

function hideError() {
  document.getElementById('errorBanner').classList.add('hidden');
}

function clearInput() {
  document.getElementById('codeInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('formatBadge').classList.remove('visible');
  hideResult();
  hideError();
}

function setInput(val) {
  const input = document.getElementById('codeInput');
  input.value = val;
  input.dispatchEvent(new Event('input'));
  input.focus();
}

function copyResult() {
  if (!lastResult) return;
  const { ohms, tolerance, label } = lastResult;
  const text = [
    primaryDisplay(ohms),
    formatOhms(ohms),
    formatKilo(ohms) || '',
    formatMega(ohms) || '',
    `Tolerance: ${tolerance}`,
    `Format: ${label}`
  ].filter(Boolean).join('\n');

  navigator.clipboard.writeText(text).catch(() => {});

  const btn = document.getElementById('copyBtn');
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M11.5 2.5L5 10 1.5 6.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg> Copied!`;
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M4 1a1 1 0 011-1h5a1 1 0 011 1v1h1a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1h0V1zm1 0v2H4v9h8V3h-1V1H5z"/></svg> Copy`;
    btn.classList.remove('copied');
  }, 1500);
}

// ─── HISTORY ───────────────────────────────────────────────────────────────
function saveHistory(code, result) {
  history = history.filter(h => h.code !== code);
  history.unshift({ code, result, time: Date.now() });
  if (history.length > 10) history = history.slice(0, 10);
  try { localStorage.setItem('ms_smd_history', JSON.stringify(history)); } catch(e){}
  renderHistory();
}

function clearHistory() {
  history = [];
  try { localStorage.removeItem('ms_smd_history'); } catch(e){}
  renderHistory();
}

function timeAgo(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'flex';
  list.innerHTML = history.map(h => `
    <div class="history-row" onclick="setInput('${h.code}')">
      <div class="history-code-badge">${h.code}</div>
      <div class="history-info">
        <div class="history-result">${h.result}</div>
        <div class="history-time">${timeAgo(h.time)}</div>
      </div>
      <span class="history-arrow">↖</span>
    </div>
  `).join('');
}

// Init
renderHistory();
</script>
</body>
</html>
